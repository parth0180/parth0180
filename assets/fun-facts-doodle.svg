<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="20" fill="url(#bgGrad7)"/>

  <!-- dotted connector line -->
  <line x1="110" y1="140" x2="700" y2="140" stroke="#BAE6FD" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round"/>

  <!-- coffee cup -->
  <g>
    <path d="M 90 120 h 40 v 24 a 20 20 0 0 1 -40 0 z" fill="#0F172A"/>
    <rect x="86" y="117" width="48" height="8" rx="4" fill="#0284C7"/>
    <path d="M 130 126 q 14 1 14 12 q 0 11 -14 11" stroke="#0F172A" stroke-width="4" fill="none"/>
    <path d="M 98 108 q -5 -8 1 -15" stroke="#94A3B8" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 112 108 q -5 -8 1 -15" stroke="#94A3B8" stroke-width="3" fill="none" opacity="0.7"/>
  </g>

  <!-- headphones -->
  <g>
    <path d="M 220 130 a 40 40 0 0 1 80 0" fill="none" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
    <rect x="212" y="128" width="16" height="26" rx="8" fill="#0EA5E9"/>
    <rect x="292" y="128" width="16" height="26" rx="8" fill="#0EA5E9"/>
  </g>

  <!-- crescent moon + stars (night owl) -->
  <g>
    <path d="M 420 90 a 28 28 0 1 0 26 38 a 22 22 0 0 1 -26 -38 z" fill="#0F172A"/>
    <path d="M 470 80 l 3 7 l 7 1 l -5 5 l 1 7 l -6 -4 l -6 4 l 1 -7 l -5 -5 l 7 -1 z" fill="#38BDF8"/>
    <path d="M 490 110 l 2 5 l 5 1 l -4 4 l 1 5 l -4 -3 l -4 3 l 1 -5 l -4 -4 l 5 -1 z" fill="#7DD3FC"/>
  </g>

  <!-- bug (lighthearted "bug count" joke) -->
  <g>
    <ellipse cx="580" cy="135" rx="22" ry="16" fill="#0EA5E9"/>
    <circle cx="580" cy="113" r="9" fill="#0F172A"/>
    <line x1="568" y1="122" x2="552" y2="112" stroke="#0F172A" stroke-width="3"/>
    <line x1="568" y1="135" x2="548" y2="135" stroke="#0F172A" stroke-width="3"/>
    <line x1="568" y1="148" x2="552" y2="158" stroke="#0F172A" stroke-width="3"/>
    <line x1="592" y1="122" x2="608" y2="112" stroke="#0F172A" stroke-width="3"/>
    <line x1="592" y1="135" x2="612" y2="135" stroke="#0F172A" stroke-width="3"/>
    <line x1="592" y1="148" x2="608" y2="158" stroke="#0F172A" stroke-width="3"/>
    <line x1="580" y1="119" x2="580" y2="151" stroke="#0F172A" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- speech bubble with chai/quote -->
  <g>
    <rect x="650" y="100" width="90" height="50" rx="14" fill="#0F172A"/>
    <path d="M 668 150 l 0 16 l 16 -16 z" fill="#0F172A"/>
    <text x="695" y="130" font-family="Fira Code, monospace" font-size="20" text-anchor="middle">☕</text>
  </g>

  <!-- floating accents -->
  <circle cx="160" cy="60" r="4" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="640" cy="60" r="5" fill="#38BDF8" opacity="0.5"/>
  <circle cx="380" cy="160" r="4" fill="#0284C7" opacity="0.5"/>
</svg>
